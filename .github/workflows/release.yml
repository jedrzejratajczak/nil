name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git rustup \
            gtk4 gtk4-layer-shell \
            greetd

      - name: Setup Rust
        run: |
          rustup default stable
          rustup target add x86_64-unknown-linux-gnu

      - uses: actions/checkout@v4

      - name: Build all binaries
        run: cargo build --release

      - name: Package binaries
        run: |
          mkdir -p release
          for bin in nilgreeter nilnotify nilpower nilwall nilwidgets; do
            cp target/release/$bin release/
          done
          cd release && tar czf ../nil-${GITHUB_REF_NAME}-x86_64.tar.gz *

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nil-${{ github.ref_name }}-x86_64.tar.gz
          generate_release_notes: true

  publish-aur:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed openssh git pacman

      - name: Setup SSH and git
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          git config --global user.name "jedrzejratajczak"
          git config --global user.email "mrozelek@gmail.com"

      - name: Publish packages to AUR
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          publish() {
            local pkg="$1" desc="$2" deps="$3"

            git clone ssh://aur@aur.archlinux.org/${pkg}-bin.git /tmp/${pkg}-bin
            cd /tmp/${pkg}-bin

            cat > PKGBUILD << EOF
          # Maintainer: Jedrzej Ratajczak <mrozelek@gmail.com>
          pkgname=${pkg}-bin
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="${desc}"
          arch=('x86_64')
          url="https://github.com/jedrzejratajczak/nil"
          license=('MIT')
          depends=(${deps})
          provides=('${pkg}')
          conflicts=('${pkg}')
          source=("\${pkgname%-bin}-\${pkgver}.tar.gz::https://github.com/jedrzejratajczak/nil/releases/download/v\${pkgver}/nil-v\${pkgver}-x86_64.tar.gz")
          sha256sums=('SKIP')

          package() {
              install -Dm755 "${pkg}" "\${pkgdir}/usr/bin/${pkg}"
          }
          EOF
            sed -i 's/^          //' PKGBUILD

            makepkg --printsrcinfo > .SRCINFO

            git add PKGBUILD .SRCINFO
            git commit -m "Update to v${VERSION}" || true
            git push origin master

            cd /
            rm -rf /tmp/${pkg}-bin
          }

          publish nilgreeter "Minimal GTK4 greeter for greetd on Hyprland" "'gtk4' 'greetd'"
          publish nilnotify  "Lightweight GTK4 notification daemon for Hyprland" "'gtk4' 'gtk4-layer-shell'"
          publish nilpower   "GTK4 power menu overlay for Hyprland" "'gtk4' 'gtk4-layer-shell'"
          publish nilwall    "GTK4 wallpaper manager for Hyprland" "'gtk4' 'gtk4-layer-shell'"
          publish nilwidgets "GTK4 system monitoring widgets for Hyprland" "'gtk4' 'gtk4-layer-shell'"
